name: Multiapps Controller Maven build

on:
  pull_request:
    branches: [ master,rel-1.73 ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'adopt'

    - name: Build with Maven
      run: mvn clean install sonar:sonar -Psonar -Dsonar.organization=cf-deploy-service -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=7a673303bb245a13ad432c1d6de3db76c0dafed2 -Dsonar.branch.name="$GITHUB_JOB"
